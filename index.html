<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화이트 해커 카메라 권한 데모</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin: 20px; 
            background: #f0f0f0;
        }
        h1 { color: #d32f2f; }
        .warning {
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin: 20px auto;
            max-width: 600px;
        }
        video { 
            width: 640px; 
            max-width: 100%; 
            border: 3px solid #d32f2f; 
            border-radius: 12px;
            margin: 15px 0;
        }
        button { 
            padding: 15px 30px; 
            font-size: 18px; 
            margin: 10px; 
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .start { background: #d32f2f; color: white; }
        .stop { background: #333; color: white; }
    </style>
</head>
<body>
    <h1>🔴 화이트 해커 학습용 데모</h1>
    
    <div class="warning">
        <strong>⚠️ 교육용 시연입니다.</strong><br>
        이 사이트는 웹을 통해 카메라 권한을 얻는 과정을 보여주는 학습용 데모입니다.<br>
        <strong>테스트 후에는 반드시 권한을 해제해주세요.</strong>
    </div>

    <p>버튼을 누르면 카메라 접근 권한을 요청합니다.</p>
   
    <button class="start" onclick="startCamera()">📹 카메라 켜기 (시연 시작)</button>
    <button class="stop" onclick="stopCamera()">⏹️ 카메라 끄기</button>
   
    <br><br>
    <video id="video" autoplay playsinline></video>
    
    <p id="status"></p>

    <script>
        let stream = null;

        async function startCamera() {
            const status = document.getElementById('status');
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: false
                });
                
                document.getElementById('video').srcObject = stream;
                status.innerHTML = "✅ <strong>카메라가 활성화되었습니다.</strong> (시연 중)";
                status.style.color = "green";
                console.log("카메라 ON");
            } catch (err) {
                status.innerHTML = "❌ 권한이 거부되었습니다.";
                status.style.color = "red";
                console.error(err);
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                document.getElementById('video').srcObject = null;
                stream = null;
                document.getElementById('status').innerHTML = "⏹️ 카메라가 꺼졌습니다.";
            }
        }

        window.addEventListener('beforeunload', stopCamera);
    </script>
</body>
</html>
